name: Update Package Version

on:
  schedule:
    - cron: '0 0 * * *'  # Run every day at midnight
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for Updates
        id: check
        run: |
          # Store current version info
          OLD_CONTENT=$(cat versions.json)

          # Get latest version from CachyOS mirror
          ENCODED_LATEST=$(curl -fsSL 'https://mirror.cachyos.org/repo/x86_64/cachyos/' | grep -Po 'proton-cachyos-1%3A\d+\.\d+\.\d+-\d+-x86_64\.pkg\.tar\.zst' | sort -V | tail -n1)
          if [ -z "$ENCODED_LATEST" ]; then
            echo "::error::No proton-cachyos package found in CachyOS mirror"
            exit 1
          fi
          LATEST=${ENCODED_LATEST//%3A/:}
          
          BASE=$(echo "$LATEST" | grep -Po '(?<=:)\d+\.\d+(?=\.)')
          RELEASE=$(echo "$LATEST" | grep -Po '(?<=\.)\d+(?=-\d+-x86_64)')
          PKGREL=$(echo "$LATEST" | grep -Po '(?<=-)\d+(?=-x86_64)')

          # Download file to temporary location
          TEMP_FILE=$(mktemp)
          curl -fsSL "https://mirror.cachyos.org/repo/x86_64/cachyos/${ENCODED_LATEST}" -o "$TEMP_FILE"

          # Get hash of the downloaded file
          HASH=$(nix hash file --base64 --type sha256 "$TEMP_FILE")
          rm "$TEMP_FILE"

          # Debug Variables
          echo "LATEST: $LATEST"
          echo "ENCODED_LATEST: $ENCODED_LATEST"
          echo "BASE: $BASE"
          echo "RELEASE: $RELEASE"
          echo "PKGREL: $PKGREL"
          echo "HASH: $HASH"

          # Create new versions.json content
          NEW_CONTENT=$(printf '{\n  "base": "%s",\n  "release": "%s",\n  "pkgrel": "%s",\n  "hash": "sha256-%s"\n}\n' "$BASE" "$RELEASE" "$PKGREL" "$HASH")

          # Compare old and new content
          if [ "$OLD_CONTENT" = "$NEW_CONTENT" ]; then
            echo "No updates available"
            echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
          else
            echo "$NEW_CONTENT" > versions.json
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
          fi

      - name: Create Pull Request
        if: env.UPDATE_NEEDED == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'proton-cachyos: update to latest version'
          title: 'Update proton-cachyos'
          body: |
            Updated proton-cachyos to latest version from CachyOS mirror.

            This PR was created automatically by the update workflow.
          branch: update-proton-cachyos
          delete-branch: true
